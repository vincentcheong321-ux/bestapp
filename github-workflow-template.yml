name: Build Remote APK

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'The GitHub repository to build (e.g., username/my-app)'
        required: true
        type: string
      project_type:
        description: 'Type of project (web or native)'
        required: true
        default: 'web'
        type: choice
        options:
          - web
          - native
      java_version:
        description: 'Java Version (8, 11, 17, 21)'
        required: true
        default: '21'
        type: choice
        options:
          - '8'
          - '11'
          - '17'
          - '21'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repo }}

      # --- WEB APP STEPS ---
      - name: Setup Node.js (Web Only)
        if: ${{ github.event.inputs.project_type == 'web' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies & Build Web (Web Only)
        if: ${{ github.event.inputs.project_type == 'web' }}
        run: |
          npm install
          npm run build

      - name: Setup Capacitor (Web Only)
        if: ${{ github.event.inputs.project_type == 'web' }}
        run: |
          BUILD_DIR="dist"
          if [ -d "build" ]; then BUILD_DIR="build"; fi
          
          # Fix absolute paths
          if [ -f "$BUILD_DIR/index.html" ]; then
            sed -i 's|href="/|href="|g' $BUILD_DIR/index.html
            sed -i 's|src="/|src="|g' $BUILD_DIR/index.html
          fi

          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npm install @capacitor/cli @capacitor/core @capacitor/android
            npx cap init "App" "com.example.app" --web-dir $BUILD_DIR
          fi
          
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi
          
          # Allow cleartext traffic
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            mkdir -p android/app/src/main/res/xml
            cat <<EOF > "android/app/src/main/res/xml/network_security_config.xml"
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true">
        <trust-anchors>
            <certificates src="system" />
        </trust-anchors>
    </base-config>
</network-security-config>
EOF
            if ! grep -q "android:networkSecurityConfig" "$MANIFEST_PATH"; then
              sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"|g' "$MANIFEST_PATH"
            fi
          fi

      # --- COMMON / NATIVE STEPS ---
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java_version }}

      - name: Build APK (Web/Capacitor)
        if: ${{ github.event.inputs.project_type == 'web' }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build APK (Native Android)
        if: ${{ github.event.inputs.project_type == 'native' }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'
