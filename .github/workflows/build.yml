name: Build Remote APK

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'The GitHub repository to build (e.g., username/my-app)'
        required: true
        type: string
      project_type:
        description: 'Type of project (web or native)'
        required: true
        default: 'web'
        type: choice
        options:
          - web
          - native
      java_version:
        description: 'Java Version (8, 11, 17, 21)'
        required: true
        default: '21'
        type: choice
        options:
          - '8'
          - '11'
          - '17'
          - '21'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repo }}

      - name: Setup Node.js (Web Only)
        if: ${{ github.event.inputs.project_type == 'web' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Web (Web Only)
        if: ${{ github.event.inputs.project_type == 'web' }}
        run: |
          npm install
          npm run build --if-present

      - name: Setup Capacitor (Web Only)
        if: ${{ github.event.inputs.project_type == 'web' }}
        run: |
          BUILD_DIR="dist"
          if [ -d "build" ]; then BUILD_DIR="build"; fi
          npm install @capacitor/cli @capacitor/core @capacitor/android
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "App" "com.example.app" --web-dir $BUILD_DIR
          fi
          npx cap add android || npx cap sync android

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java_version }}

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.project_type }}" == "web" ]; then cd android; fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: '**/*.apk'
